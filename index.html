<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mímica</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎭 Mímica em Duplas</h1>

<div id="setup" class="card">

<div class="row">
<label>Duplas</label>
<input type="number" id="teams" value="2" min="2" max="10">
</div>

<div class="row">
<label>Tempo</label>
<input type="number" id="time" value="60">
</div>

<div class="row">
<label>Nível</label>
<select id="level">
<option value="easy">Fácil</option>
<option value="medium">Médio</option>
<option value="hard">Difícil</option>
</select>
</div>

<button class="start" onclick="startGame()">Começar</button>

</div>

<div id="game" class="hidden">

<div class="top">
<div id="team"></div>
<div id="timer"></div>
</div>

<div id="word">Palavra</div>

<div class="buttons">
<button class="correct" onclick="correct()">Acertou</button>
<button class="skip" onclick="skip()">Pular</button>
</div>

</div>

<div id="score" class="score"></div>

</div>

<script src="script.js"></script>
</body>
</html>
