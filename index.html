<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mímica</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎭 Mímica</h1>

<div id="setup" class="card">

<label>Quantidade de duplas</label>
<input type="number" id="teamsCount" value="2" min="2" max="10">

<div id="teamNames"></div>

<label>Tempo por tentativa</label>
<input type="number" id="time" value="30">

<button onclick="startGame()">Começar</button>

</div>

<div id="game" class="hidden">

<div class="top">
<div id="team"></div>
<div id="timer"></div>
</div>

<div id="word"></div>

<div class="buttons">
<button onclick="correct()">Acertou</button>
<button onclick="wrong()">Errou</button>
</div>

</div>

<div id="score"></div>

</div>

<script src="script.js"></script>
</body>
</html>
